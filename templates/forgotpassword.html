<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .forgot-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            color: black;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #222;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            border: none;
            border-radius: 5px;
            background-color: #d3d3d3;
            color: black;
            font-size: 14px;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #444;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            background-color: #1565c0;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0d47a1;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .footer a {
            text-decoration: none;
            color: #1565c0;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="forgot-container">

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            {% endif %}
        {% endwith %}

        <h2>Forgot Password</h2>

        <form method="post">
            <input type="email" name="email" placeholder="Enter Your Email" required>

            <button type="submit">Submit</button>

            <div class="footer">
                Back to Login?
                <a href="{{url_for('login')}}">Click Here</a>
            </div>
        </form>

    </div>

</body>
</html>
