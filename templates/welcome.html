<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: grey;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
        }

        button {
            width: 180px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .register-btn {
            background: black;
            color: white;
        }

        .register-btn:hover {
            background: #218838;
        }

        .login-btn {
            background: green;
            color: white;
        }

        .login-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{url_for('register')}}">
            <button class="register-btn">Register</button>
        </a>
        <br><br>

        <a href="{{url_for('login')}}">
            <button class="login-btn">Login</button>
        </a>
    </div>
</body>
</html>
